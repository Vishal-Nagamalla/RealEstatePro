services:
  db:
    image: postgres:16-alpine
    container_name: realestatepro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-srikar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-realestatepro}
    ports:
      - "5555:5432"
    volumes:
      - realestatepro_db_data:/var/lib/postgresql/data
      - ./data:/data

volumes:
  realestatepro_db_data: